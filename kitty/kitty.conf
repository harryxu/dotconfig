# vim:fileencoding=utf-8:foldmethod=marker

font_family      family="Iosevka Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 25.0
shell_integration no-cursor
window_padding_width 5

tab_bar_edge            top
tab_bar_min_tabs        2
tab_bar_margin_height   0 0
tab_bar_margin_width    0
tab_bar_background      #383C51
inactive_tab_foreground #70768D
inactive_tab_background #383C51
active_tab_background   #31363F
active_tab_foreground   #c6d0f5
tab_title_template "{fmt.noitalic}{fmt.fg.tab}⌘{index} {tab.active_oldest_exe}{activity_symbol}{fmt.fg.red}{bell_symbol} "
active_tab_title_template "{fmt.noitalic}{fmt.fg.tab} {index} {tab.active_oldest_exe}{activity_symbol}{fmt.fg.red}{bell_symbol} "
tab_bar_style custom
tab_separator ""

# Tab navigation - macOS and non-macOS support
# On macOS: Cmd+n to go to tab n
# On other systems: Alt+n to go to tab n
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Alt+n for non-macOS systems
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# includes theme and custom configs
include current-theme.conf
globinclude custom*.conf
